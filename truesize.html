<style>
  /* ── Design direction: dark cartographic / observatory aesthetic ──
     Deep navy/charcoal base, warm parchment accents, mono type for coords.
     Feels like a serious geographic tool, not a toy. */

  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:        #0d1117;
    --surface:   #161b22;
    --surface2:  #1c2230;
    --border:    #2a3347;
    --border2:   #3d4f6b;
    --text:      #e8eaf0;
    --muted:     #7a8aa0;
    --accent:    #c8a96e;   /* warm gold */
    --accent2:   #5b8dd9;   /* cool blue */
    --danger:    #e07070;
    --radius:    6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

  /* ── Layout ── */
  #shell { display: flex; flex-direction: column; height: 100vh; }

  /* ── Header ── */
  #header {
    display: flex; align-items: center; gap: 16px;
    padding: 10px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 1000;
  }
  #logo {
    font-family: 'Playfair Display', serif;
    font-size: 17px; font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.02em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  #logo span { color: var(--muted); font-weight: 500; font-size: 14px; }

  /* Search */
  #search-wrap { position: relative; flex: 1; max-width: 340px; }
  #search-input {
    width: 100%; padding: 8px 36px 8px 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color .15s;
  }
  #search-input::placeholder { color: var(--muted); }
  #search-input:focus { border-color: var(--accent2); }
  #search-icon {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none; font-size: 15px;
  }
  #suggestions {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 9999;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: var(--radius); max-height: 220px; overflow-y: auto;
    display: none; box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .sug-item {
    padding: 9px 14px; font-size: 13px; cursor: pointer;
    color: var(--text); display: flex; align-items: center; gap: 8px;
    transition: background .1s;
  }
  .sug-item:hover { background: var(--surface2); }
  .sug-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sug-type { font-size: 11px; color: var(--muted); margin-left: auto; }

  #add-btn {
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    background: var(--accent); color: #0d1117;
    border: none; border-radius: var(--radius); cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: opacity .15s, transform .1s;
    white-space: nowrap; flex-shrink: 0;
  }
  #add-btn:hover { opacity: 0.88; }
  #add-btn:active { transform: scale(0.97); }

  #clear-btn {
    padding: 8px 12px; font-size: 12px; font-weight: 400;
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: var(--radius);
    cursor: pointer; font-family: 'DM Sans', sans-serif;
    transition: color .15s, border-color .15s;
    white-space: nowrap; flex-shrink: 0;
  }
  #clear-btn:hover { color: var(--danger); border-color: var(--danger); }

  /* ── Chips bar ── */
  #chips-bar {
    display: flex; align-items: center; flex-wrap: wrap; gap: 6px;
    padding: 8px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    min-height: 42px; flex-shrink: 0;
  }
  #chips-bar:empty::before {
    content: 'Search for a country or continent above and click Add';
    color: var(--muted); font-size: 12px; font-style: italic;
  }
  .chip {
    display: flex; align-items: center; gap: 7px;
    padding: 4px 10px 4px 8px;
    border-radius: 99px; font-size: 12px; font-weight: 500;
    border: 1px solid transparent; cursor: default;
    font-family: 'DM Mono', monospace;
    transition: opacity .15s;
  }
  .chip-swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .chip-name { max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip-area { font-size: 10px; opacity: 0.75; }
  .chip-x {
    cursor: pointer; font-size: 15px; line-height: 1; opacity: 0.6;
    margin-left: 2px; transition: opacity .1s;
  }
  .chip-x:hover { opacity: 1; }

  /* ── Map ── */
  #map-wrap { flex: 1; position: relative; }
  #map { width: 100%; height: 100%; }

  /* Leaflet dark tile override */
  .leaflet-tile { filter: brightness(0.6) saturate(0.5) hue-rotate(185deg); }

  /* ── Status overlay ── */
  #status {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    z-index: 900; pointer-events: none;
    background: rgba(13,17,23,0.85); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 6px 14px;
    font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted);
    backdrop-filter: blur(6px);
    transition: opacity .3s;
  }

  /* ── Lat info panel ── */
  #latpanel {
    position: absolute; top: 12px; right: 12px; z-index: 900;
    background: rgba(22,27,34,0.92); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; width: 180px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    backdrop-filter: blur(6px);
  }
  #latpanel h4 {
    font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
    color: var(--muted); margin-bottom: 8px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .lat-row { display: flex; justify-content: space-between; margin-bottom: 4px; color: var(--text); }
  .lat-row span:last-child { color: var(--accent); }

  /* ── Loading overlay ── */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 9999; gap: 16px;
    transition: opacity .4s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  #loading-title {
    font-family: 'Playfair Display', serif; font-size: 28px;
    color: var(--accent); letter-spacing: 0.04em;
  }
  #loading-sub { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; }
  #loading-bar {
    width: 200px; height: 2px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  #loading-fill {
    height: 100%; width: 0%; background: var(--accent);
    border-radius: 2px; transition: width .4s ease;
  }

  /* ── Tooltip ── */
  #tooltip {
    position: absolute; pointer-events: none; z-index: 800;
    background: rgba(22,27,34,0.95); border: 1px solid var(--border2);
    border-radius: var(--radius); padding: 8px 12px;
    font-size: 12px; font-family: 'DM Mono', monospace;
    color: var(--text); display: none; white-space: nowrap;
    backdrop-filter: blur(4px);
  }
  #tooltip strong { color: var(--accent); font-size: 13px; display: block; margin-bottom: 3px; }

  /* Leaflet attribution dark */
  .leaflet-control-attribution { background: rgba(13,17,23,0.7) !important; color: var(--muted) !important; }
  .leaflet-control-attribution a { color: var(--accent2) !important; }
  .leaflet-bar a { background: var(--surface) !important; color: var(--text) !important; border-color: var(--border) !important; }
  .leaflet-bar a:hover { background: var(--surface2) !important; }

  /* scrollbar */
  #suggestions::-webkit-scrollbar { width: 4px; }
  #suggestions::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>

<!-- Loading screen -->
<div id="loading">
  <div id="loading-title">True Size</div>

map.on('mousemove', (e) => {

  const inflate = (scale * scale).toFixed(2);
  document.getElementById('lp-lat').textContent = lat.toFixed(1) + '°';
  document.getElementById('lp-scale').textContent = scale.toFixed(2) + '×';
  document.getElementById('lp-inflate').textContent = inflate + '×';

    sub.textContent = 'ready';

    await new Promise(r => setTimeout(r, 300));
    document.getElementById('loading').classList.add('hidden');
    mapReady = true;

    // Add default countries
    addOverlay('United States');
    addOverlay('India');

  } catch (err) {
    sub.textContent = 'error: ' + err.message;
    console.error(err);
  }
}

// ══════════════════════════════════════════════════════════════
//  MERCATOR RESCALING MATH
//  The core of the whole app.
//
//  The Mercator scale factor at latitude φ is: k(φ) = 1/cos(φ)
//
//  When we drag a shape from original centroid latitude φ₀ to
//  new centroid latitude φ₁, each point's offset from the centroid
//  must be rescaled so the shape renders at its TRUE angular size
//  (not inflated by the new latitude's Mercator distortion).
//
//  For longitude offsets: scale by cos(φ₀)/cos(φ₁)
//  For latitude offsets:  scale by mercatorY'(φ₀)/mercatorY'(φ₁)
//  where mercatorY'(φ) = 1/cos(φ) (derivative of ln·tan·...)
//
//  This means both axes scale by the same ratio: cos(φ₀)/cos(φ₁)
//  which is the ratio of the two Mercator scale factors.
// ══════════════════════════════════════════════════════════════

const DEG = Math.PI / 180;

function centroidOfFeatures(features) {
  // Simple arithmetic mean of all polygon vertices
  let sumLat = 0, sumLng = 0, count = 0;
  features.forEach(f => {
    walkCoords(f.geometry.coordinates, ([lng, lat]) => {
      sumLat += lat; sumLng += lng; count++;
    });
  });
  return { lat: sumLat / count, lng: sumLng / count };
}

function walkCoords(coords, cb) {
  if (typeof coords[0] === 'number') { cb(coords); return; }
  coords.forEach(c => walkCoords(c, cb));
}

// Reproject all features: translate centroid to (newLat, newLng),
// then rescale each vertex offset to counteract Mercator distortion.
function reprojectFeatures(features, origCentroid, newCentLat, newCentLng) {
  const φ0 = origCentroid.lat * DEG;
  const φ1 = newCentLat * DEG;

  // The rescale ratio: how much bigger/smaller each offset becomes
  // cos(φ₀)/cos(φ₁):
  //   - Moving toward poles (φ₁ > φ₀): cos decreases, ratio < 1 → shape SHRINKS
  //   - Moving toward equator (φ₁ < φ₀): cos increases, ratio > 1 → shape GROWS
  // This is exactly what we want: the true angular size is constant,
  // but the Mercator rendering compensates.
  const cosRatio = Math.cos(φ0) / Math.cos(φ1);

  const dLat = newCentLat - origCentroid.lat;
  const dLng = newCentLng - origCentroid.lng;

  return features.map(f => {
    const newCoords = transformCoords(f.geometry.coordinates, origCentroid, dLat, dLng, cosRatio);
    return {
      ...f,
      geometry: { ...f.geometry, coordinates: newCoords }
    };
  });
}

function transformCoords(coords, center, dLat, dLng, ratio) {
  if (typeof coords[0] === 'number') {
    const [lng, lat] = coords;
    // Offset from original centroid
    const offLat = lat - center.lat;
    const offLng = lng - center.lng;
    // Scale the offset by the ratio, then translate to new center
    const newLat = (center.lat + dLat) + offLat * ratio;
    const newLng = (center.lng + dLng) + offLng * ratio;
    return [newLng, newLat];
  }
  return coords.map(c => transformCoords(c, center, dLat, dLng, ratio));
}

// ══════════════════════════════════════════════════════════════
//  FEATURE LOOKUP
// ══════════════════════════════════════════════════════════════
function findFeaturesByName(name) {
  const upper = name.trim().toUpperCase();

  // Check continents first
  if (CONTINENT_CODES[name]) {
    const codes = CONTINENT_CODES[name];
    return allFeatures.filter(f => codes.includes(+f.id));
  }

  // Search by name map
  for (const [id, n] of Object.entries(nameMap)) {
    if (n.toUpperCase() === upper) {
      const feat = allFeatures.find(f => +f.id === +id);
      if (feat) return [feat];
    }
  }

  // Fuzzy fallback on name map
  for (const [id, n] of Object.entries(nameMap)) {
    if (n.toUpperCase().includes(upper) || upper.includes(n.toUpperCase())) {
      const feat = allFeatures.find(f => +f.id === +id);
      if (feat) return [feat];
    }
  }

  return [];
}

function featureCentroid(features) {
  return centroidOfFeatures(features);
}

// ══════════════════════════════════════════════════════════════
//  ADD OVERLAY
// ══════════════════════════════════════════════════════════════
function addOverlay(name) {
  if (!mapReady) return;

  const originalFeatures = findFeaturesByName(name);
  if (!originalFeatures.length) {
    showStatus('Country not found: ' + name, 3000);
    return;
  }

  // Avoid duplicates
  if (overlays.find(o => o.name.toLowerCase() === name.toLowerCase())) {
    showStatus(name + ' is already on the map', 2000);
    return;
  }

  if (overlays.length >= 8) {
    showStatus('Maximum 8 countries at a time', 2000);
    return;
  }

  const color = PALETTE[paletteIdx % PALETTE.length];
  paletteIdx++;

  const origCentroid = featureCentroid(originalFeatures);
  const mapCenter = map.getCenter();

  // Initial position: place centroid at current map center
  const initLat = mapCenter.lat;
  const initLng = mapCenter.lng;

  const area = AREAS[name] ? formatArea(AREAS[name]) : '?';

  // Create Leaflet GeoJSON layer
  const geojsonData = {
    type: 'FeatureCollection',
    features: reprojectFeatures(originalFeatures, origCentroid, initLat, initLng)
  };

  const layer = L.geoJSON(geojsonData, {
    style: {
      color: color.stroke,
      fillColor: color.fill,
      fillOpacity: 0.28,
      weight: 1.8,
      opacity: 0.9,
    }
  }).addTo(map);

  // Build chip
  const chip = document.createElement('div');
  chip.className = 'chip';
  chip.style.cssText = `background:${color.bg};border-color:${color.fill}40;color:${color.text}`;
  chip.innerHTML = `
    <span class="chip-swatch" style="background:${color.fill}"></span>
    <span class="chip-name">${name}</span>
    <span class="chip-area">${area} km²</span>
    <span class="chip-x" title="Remove">×</span>
  `;
  document.getElementById('chips-bar').appendChild(chip);

  const overlay = {
    name, originalFeatures, origCentroid,
    currentLat: initLat, currentLng: initLng,
    layer, color, chip
  };
  overlays.push(overlay);

  // ── Drag logic ──
  let isDragging = false;
  let dragStartLL = null;
  let dragStartCentLat = 0;
  let dragStartCentLng = 0;

  layer.on('mousedown', (e) => {
    isDragging = true;
    dragStartLL = e.latlng;
    dragStartCentLat = overlay.currentLat;
    dragStartCentLng = overlay.currentLng;
    map.dragging.disable();
    document.body.style.cursor = 'grabbing';
    e.originalEvent.preventDefault();
    e.originalEvent.stopPropagation();
  });

  layer.on('mouseover', (e) => {
    if (!isDragging) {
      layer.setStyle({ fillOpacity: 0.42, weight: 2.4 });
      showTooltip(e, name, area, overlay.currentLat);
    }
  });

  layer.on('mouseout', () => {
    if (!isDragging) {
      layer.setStyle({ fillOpacity: 0.28, weight: 1.8 });
      hideTooltip();
    }
  });

  layer.on('mousemove', (e) => {
    if (!isDragging) updateTooltipPos(e);
  });

  map.on('mousemove', (e) => {
    if (!isDragging) return;

    const deltaLat = e.latlng.lat - dragStartLL.lat;
    const deltaLng = e.latlng.lng - dragStartLL.lng;

    let newCentLat = dragStartCentLat + deltaLat;
    let newCentLng = dragStartCentLng + deltaLng;

    // Clamp latitude to Mercator valid range
    newCentLat = Math.max(-82, Math.min(82, newCentLat));

    overlay.currentLat = newCentLat;
    overlay.currentLng = newCentLng;

    // Reproject features to new centroid position with Mercator correction
    const newFeatures = reprojectFeatures(
      overlay.originalFeatures, overlay.origCentroid,
      newCentLat, newCentLng
    );

    // Update Leaflet layer
    layer.clearLayers();
    layer.addData({ type: 'FeatureCollection', features: newFeatures });
  });

  map.on('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      map.dragging.enable();
      document.body.style.cursor = '';
      layer.setStyle({ fillOpacity: 0.28, weight: 1.8 });
    }
  });

  // Right-click to remove
  layer.on('contextmenu', (e) => {
    removeOverlay(overlay);
    e.originalEvent.preventDefault();
  });

  // Chip remove button
  chip.querySelector('.chip-x').addEventListener('click', () => removeOverlay(overlay));

  showStatus(`${name} added — drag to compare sizes`, 2500);
}

function removeOverlay(overlay) {
  map.removeLayer(overlay.layer);
  overlay.chip.remove();
  overlays = overlays.filter(o => o !== overlay);
}

// ══════════════════════════════════════════════════════════════
//  UI HELPERS
// ══════════════════════════════════════════════════════════════
function formatArea(km2) {
  if (km2 >= 1000000) return (km2/1000000).toFixed(1) + 'M';
  if (km2 >= 1000) return (km2/1000).toFixed(0) + 'K';
  return km2.toString();
}

let statusTimer;
function showStatus(msg, dur=3000) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => {
    el.style.opacity = '0.4';
    el.textContent = 'Drag any shape to compare sizes across latitudes';
  }, dur);
}

const tooltip = document.getElementById('tooltip');
function showTooltip(e, name, area, lat) {
  const scale = (1/Math.cos(lat * DEG)).toFixed(2);
  tooltip.innerHTML = `<strong>${name}</strong>${area} km²<br>lat ${lat.toFixed(1)}° · scale ${scale}×`;
  tooltip.style.display = 'block';
  updateTooltipPos(e);
}
function updateTooltipPos(e) {
  const r = document.getElementById('map').getBoundingClientRect();
  const x = e.originalEvent.clientX - r.left + 14;
  const y = e.originalEvent.clientY - r.top - 10;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}
function hideTooltip() { tooltip.style.display = 'none'; }

// ══════════════════════════════════════════════════════════════
//  SEARCH / AUTOCOMPLETE
// ══════════════════════════════════════════════════════════════
const searchInput = document.getElementById('search-input');
const sugBox = document.getElementById('suggestions');

function renderSuggestions(query) {
  const q = query.trim().toLowerCase();
  sugBox.innerHTML = '';
  if (!q) { sugBox.style.display = 'none'; return; }

  const continents = COUNTRY_LIST.filter(n => CONTINENT_CODES[n]);
  const countries  = COUNTRY_LIST.filter(n => !CONTINENT_CODES[n]);

  const matchCont = continents.filter(n => n.toLowerCase().includes(q));
  const matchCoun = countries.filter(n => n.toLowerCase().startsWith(q))
    .concat(countries.filter(n => n.toLowerCase().includes(q) && !n.toLowerCase().startsWith(q)))
    .slice(0, 10);

  const all = [...matchCont, ...matchCoun].slice(0, 12);
  if (!all.length) { sugBox.style.display = 'none'; return; }

  all.forEach(name => {
    const isContinent = !!CONTINENT_CODES[name];
    const color = isContinent ? '#c8a96e' : '#5b8dd9';
    const d = document.createElement('div');
    d.className = 'sug-item';
    d.innerHTML = `
      <span class="sug-dot" style="background:${color}"></span>
      ${name}
      <span class="sug-type">${isContinent ? 'continent' : 'country'}</span>
    `;
    d.addEventListener('mousedown', (e) => {
      e.preventDefault();
      searchInput.value = name;
      sugBox.style.display = 'none';
    });
    sugBox.appendChild(d);
  });
  sugBox.style.display = 'block';
}

searchInput.addEventListener('input', () => renderSuggestions(searchInput.value));
searchInput.addEventListener('blur', () => setTimeout(() => sugBox.style.display = 'none', 160));
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); doAdd(); }
  if (e.key === 'Escape') { sugBox.style.display = 'none'; searchInput.blur(); }
  // Arrow key nav
  if (e.key === 'ArrowDown') {
    const items = sugBox.querySelectorAll('.sug-item');
    if (items.length) { e.preventDefault(); items[0].focus(); }
  }
});
sugBox.addEventListener('keydown', (e) => {
  const items = [...sugBox.querySelectorAll('.sug-item')];
  const idx = items.indexOf(document.activeElement);
  if (e.key === 'ArrowDown' && idx < items.length-1) items[idx+1].focus();
  if (e.key === 'ArrowUp') { if (idx > 0) items[idx-1].focus(); else searchInput.focus(); }
  if (e.key === 'Enter' && idx >= 0) {
    searchInput.value = items[idx].textContent.replace(/continent|country/g,'').trim();
    sugBox.style.display = 'none';
    doAdd();
  }
});

function doAdd() {
  const val = searchInput.value.trim();
  if (!val) return;
  sugBox.style.display = 'none';
  addOverlay(val);
  searchInput.value = '';
  searchInput.focus();
}

document.getElementById('add-btn').addEventListener('click', doAdd);

document.getElementById('clear-btn').addEventListener('click', () => {
  [...overlays].forEach(o => removeOverlay(o));
  paletteIdx = 0;
});

// ══════════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUT: / to focus search
// ══════════════════════════════════════════════════════════════
document.addEventListener('keydown', (e) => {
  if (e.key === '/' && document.activeElement !== searchInput) {
    e.preventDefault();
    searchInput.focus();
    searchInput.select();
  }
});
